# PyWry - Ruff Configuration

target-version = "py310"
line-length = 100

exclude = [
    ".git",
    ".ruff_cache",
    ".pytest_cache",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
    ".venv",
    "venv",
]
include = ["*.py", "*.pyi"]
fix = true
show-fixes = true
output-format = "grouped"

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "B",
    "C4",
    "SIM",
    "N",
    "D",
    "S",
    "A",
    "C90",
    "RUF",
    "ASYNC",
    "TCH",
    "PTH",
    "PL",
    "TRY",
    "PERF",
    "LOG",
]

ignore = [
    "E501",     # line-length — handled by `line-length = 100`
    "D100",     # missing docstring in public module
    "D104",     # missing docstring in public package
    "D105",     # missing docstring in magic method
    "D107",     # missing docstring in __init__
    "D203",     # 1 blank line before class docstring (conflicts with D211)
    "D213",     # multi-line summary should start at the second line (conflicts with D212)
    "TRY003",   # long messages outside exception class
    "PLR0913",  # too many arguments — relaxed for Pydantic constructors
    "PLR2004",  # magic value used in comparison
    "D401",     # first-line imperative mood
    "B008",     # function call in argument defaults — Pydantic Field()
    "N818",     # exception name must end with Error (we follow stdlib naming)
    "PERF203",  # try/except in a loop is intentional in a few dispatch paths
    "PLC0415",  # import-outside-toplevel — used for lazy optional imports
]

fixable = ["ALL"]
unfixable = [
    "F401",
    "F841",
]

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# Rule ignores below are deliberately scoped to the test suite so they
# can't mask real issues in shipped code.  Each entry explains why the
# rule is inappropriate under ``tests/`` specifically.
"tests/**/*.py" = [
    "S101",     # `assert` is the primary test mechanism
    "D",        # pydocstyle rules do not apply to test fixtures / cases
    "PLR2004",  # magic numbers are expected in assertions
    "S104",     # binding to 0.0.0.0 in integration tests (testcontainers, etc.)
    "S105",     # hard-coded "password" / secret fixtures
    "S106",     # hard-coded passwords in test kwargs (e.g. OAuth fixtures)
    "S108",     # hard-coded /tmp paths in fixtures
    "S310",     # unverified urllib calls against fixture URLs
    "ARG",      # unused fixture / mock arguments are idiomatic in pytest
    "ASYNC240", # deliberately blocking calls in async tests (e.g. assertions)
    "PERF401",  # readability beats micro-optimisation in tests
]

"__init__.py" = [
    "E402",
    "F401",
    "D104",
]

"pywry/chat/providers/callback.py" = [
    "TC003",
]

"pywry/state/sqlite.py" = [
    "D102",
]

"pywry/__main__.py" = [
    "W293",  # Trailing whitespace in JS template strings
    "S110",  # try-except-pass in window cleanup
]

"pywry/cli.py" = [
    "PLR0912",
]

"examples/**/*.py" = [
    "S311",   # pseudo-random for UI animation/demo delays, not security
    "S110",   # try-except-pass acceptable in demos
    "N806",   # uppercase variable names in function scope
    "C901",   # complexity limits relaxed for demos
    "PLR0911", # too many return statements
    "PLR0912", # too many branches
    "PLR0915", # too many statements
    "RUF002", # ambiguous unicode in docstrings (en-dash)
    "RUF003", # ambiguous unicode in comments (en-dash)
]

"pywry/config.py" = [
    "N815",
    "S110",  # try-except-pass in TOML parsing
]

"pywry/runtime.py" = [
    "PLW0602",  # Global used but not assigned
    "PLW0603",  # Global statement for singleton pattern
    "S110",     # try-except-pass in shutdown
    "S603",     # subprocess call
]

"pywry/asset_loader.py" = [
    "PLW0603",  # Global statement for singleton pattern
    "TRY300",   # Return in try block is intentional
]

"pywry/hot_reload.py" = [
    "PLW0603",  # Global statement for singleton pattern
    "TRY300",   # Return in try block is intentional
]

"pywry/watcher.py" = [
    "PLW0603",  # Global statement for singleton pattern
]

"pywry/callbacks.py" = [
    "TRY300",   # Return in try block is intentional
]

"pywry/commands/__init__.py" = [
    "TRY300",   # Return in try block is intentional
]

"pywry/_pyinstaller_hook/hook-pywry.py" = [
    "N999",  # Hyphenated module name required by PyInstaller convention
]

[lint.isort]
known-first-party = ["pywry"]
known-third-party = ["pytauri", "pydantic", "pydantic_settings", "anyio", "watchdog"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
force-single-line = false
combine-as-imports = true
lines-after-imports = 2
lines-between-types = 1

[lint.pydocstyle]
convention = "numpy"

[lint.mccabe]
max-complexity = 12

[lint.pylint]
max-args = 10
max-locals = 20
max-branches = 12
max-statements = 50
max-public-methods = 25

[lint.flake8-bugbear]
extend-immutable-calls = ["pydantic.Field", "Field"]

[lint.flake8-type-checking]
exempt-modules = ["typing", "typing_extensions"]
runtime-evaluated-base-classes = ["pydantic.BaseModel", "pydantic_settings.BaseSettings"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "native"
preview = false
docstring-code-format = true
docstring-code-line-length = 80
